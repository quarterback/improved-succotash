<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Occupant</title>
<meta name="description" content="A studio for problems that should already be solved." />
<link rel="icon" type="image/svg+xml" href="logo.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
@font-face {
  font-family: 'Aminute';
  src: url('fonts/aminute-regular.woff') format('woff');
  font-weight: 400;
  font-display: swap;
}

:root {
  --paper: #ecd56c;
  --ink: #1a1612;
  --ink-soft: #4b4339;
  --ink-mute: #6b6049;
  --rule: #c4b04c;
  --rule-soft: #d4c25a;
  --accent: #8a3a1f;
  --accent-wash: rgba(138, 58, 31, 0.10);

  --serif: 'Newsreader', 'Source Serif Pro', Georgia, serif;
  --mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
  --display: 'Aminute', 'Newsreader', serif;

  color-scheme: light;
}

:root[data-theme="dark"] {
  --paper: #14110e;
  --ink: #ebe3d3;
  --ink-soft: #b1a692;
  --ink-mute: #6f6759;
  --rule: #2a241c;
  --rule-soft: #1f1a14;
  --accent: #d97757;
  --accent-wash: rgba(217, 119, 87, 0.10);
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern", "liga", "onum";
  transition: background-color .3s ease, color .3s ease;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

a { color: inherit; text-decoration: none; }
::selection { background: var(--accent); color: var(--paper); }

/* MASTHEAD — wordmark + a single quiet link */
.masthead {
  padding: 1.75rem 2.25rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.wordmark {
  font-family: var(--display);
  font-size: 0.95rem;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: var(--ink);
}
.masthead a.to-indices {
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding: 0.35rem 0;
  border-bottom: 1px solid transparent;
  transition: color .15s ease, border-color .15s ease;
}
.masthead a.to-indices:hover {
  color: var(--ink);
  border-bottom-color: var(--ink);
}
.masthead a.to-indices .arrow {
  display: inline-block;
  margin-left: 0.5rem;
  transition: transform .2s ease;
}
.masthead a.to-indices:hover .arrow { transform: translateX(3px); }

/* CENTER STAGE */
main {
  display: grid;
  place-items: center;
  padding: 4rem 2.25rem;
}

.statement {
  max-width: 48rem;
  text-align: left;
}

.mark {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 3rem;
  display: flex;
  align-items: center;
  gap: 0.85rem;
}
.mark::before {
  content: "";
  display: inline-block;
  width: 1.5rem;
  height: 1px;
  background: var(--accent);
}

.statement h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(2.4rem, 6.4vw, 5.2rem);
  line-height: 1.04;
  letter-spacing: -0.025em;
  color: var(--ink);
  text-wrap: balance;
}

.statement h1 em {
  font-style: italic;
  color: var(--ink-soft);
}

.statement h1 .stop {
  color: var(--accent);
}

/* SIGN-OFF */
.signoff {
  margin-top: 3.5rem;
  font-family: var(--mono);
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  color: var(--ink-mute);
  display: flex;
  align-items: baseline;
  gap: 0.85rem;
}
.signoff .glyph {
  color: var(--accent);
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.05rem;
  letter-spacing: 0;
}

/* FOOTER */
footer {
  padding: 1.5rem 2.25rem 1.75rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
footer .stamp {
  font-family: var(--display);
  letter-spacing: 0.32em;
  color: var(--ink-soft);
}

/* MOBILE */
@media (max-width: 640px) {
  .masthead { padding: 1.25rem 1.4rem; }
  main { padding: 2.5rem 1.4rem 3rem; }
  .mark { margin-bottom: 2rem; }
  .signoff { margin-top: 2.5rem; }
  footer { padding: 1.25rem 1.4rem 1.4rem; gap: 1rem; }
}

/* ENTRANCE */
.in {
  animation: enter 1.1s ease both;
}
.in.delay-1 { animation-delay: .12s; }
.in.delay-2 { animation-delay: .26s; }
.in.delay-3 { animation-delay: .42s; }
@keyframes enter {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
@media (prefers-reduced-motion: reduce) {
  .in, .masthead a.to-indices .arrow { animation: none !important; transition: none !important; }
}

/* TWEAKS PANEL */
.tweaks-panel {
  position: fixed;
  bottom: 1.25rem;
  right: 1.25rem;
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 1rem 1.25rem;
  box-shadow: 0 12px 40px rgba(0,0,0,0.10);
  z-index: 100;
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  display: none;
  flex-direction: column;
  gap: 0.85rem;
  min-width: 220px;
}
.tweaks-panel.open { display: flex; }
.tweaks-panel header {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--rule-soft);
  padding-bottom: 0.5rem;
}
.tweaks-panel header span { color: var(--ink); }
.tweaks-panel header button {
  background: none; border: 0; color: var(--ink-mute); cursor: pointer;
  font-family: inherit; font-size: 0.9rem; padding: 0;
}
.tweaks-row {
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.tweaks-row .label { color: var(--ink-mute); }
.tweaks-options { display: inline-flex; border: 1px solid var(--rule); }
.tweaks-options button {
  background: var(--paper);
  border: 0;
  border-right: 1px solid var(--rule);
  color: var(--ink-mute);
  padding: 0.35rem 0.6rem;
  font-family: inherit;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
}
.tweaks-options button:last-child { border-right: 0; }
.tweaks-options button.active { background: var(--ink); color: var(--paper); }
.tweaks-options.swatches button { padding: 0.25rem 0.5rem; font-size: 1rem; line-height: 1; }
.tweaks-options.swatches button[data-value][style*="background"] {
  width: 1.4rem; height: 1.4rem; padding: 0;
  border-right: 1px solid var(--rule);
}
.tweaks-options.swatches button[data-value][style*="background"]:last-child { border-right: 0; }
.tweaks-options.swatches button[data-value][style*="background"].active {
  outline: 2px solid var(--ink);
  outline-offset: -2px;
  background-clip: padding-box;
}
</style>
</head>
<body>

<header class="masthead">
  <a href="index.html" class="wordmark in">Occupant</a>
  <a href="indices.html" class="to-indices in delay-1">Indices <span class="arrow">→</span></a>
</header>

<main>
  <div class="statement">
    <div class="mark in delay-1"></div>
    <h1 class="in delay-2">
      For problems<br />
      that should already <em>be solved<span class="stop">.</span></em>
    </h1>
    <div class="signoff in delay-3">
      <span class="glyph">
</span>
      <span>
</span>
    </div>
  </div>
</main>

<footer>
  <span class="stamp">Occupant</span>
</footer>

<!-- TWEAKS PANEL -->
<div class="tweaks-panel" id="tweaks">
  <header>
    <span>Tweaks</span>
    <button id="tweaks-close" aria-label="Close">×</button>
  </header>
  <div class="tweaks-row">
    <span class="label">Theme</span>
    <div class="tweaks-options" data-tweak="theme">
      <button data-value="light" class="active">Paper</button>
      <button data-value="dark">Ink</button>
    </div>
  </div>
  <div class="tweaks-row">
    <span class="label">Palette</span>
    <div class="tweaks-options swatches" data-tweak="palette">
      <button data-value="mustard" class="active" style="background:#ecd56c">&nbsp;</button>
      <button data-value="salmon" style="background:#ffb999">&nbsp;</button>
      <button data-value="sage" style="background:#b8d4b8">&nbsp;</button>
      <button data-value="lilac" style="background:#d0bce0">&nbsp;</button>
      <button data-value="cream" style="background:#f1ece1">&nbsp;</button>
    </div>
  </div>
  <div class="tweaks-row">
    <span class="label">Accent</span>
    <div class="tweaks-options swatches" data-tweak="accent">
      <button data-value="sienna" class="active" style="color:#8a3a1f">●</button>
      <button data-value="ink" style="color:#1a1612">●</button>
      <button data-value="navy" style="color:#1d3557">●</button>
      <button data-value="moss" style="color:#4a5d3a">●</button>
    </div>
  </div>
</div>

<script>
/* ============ TWEAKS ============ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "palette": "mustard",
  "accent": "sienna"
}/*EDITMODE-END*/;

const PALETTES = {
  /* All AA-compliant body text on these backgrounds with --ink #1a1612 + tuned --ink-mute */
  mustard: { paper: '#ecd56c', mute: '#6b6049', rule: '#c4b04c', ruleSoft: '#d4c25a' },
  salmon:  { paper: '#ffb999', mute: '#6f4536', rule: '#d99373', ruleSoft: '#ea9d7e' },
  sage:    { paper: '#b8d4b8', mute: '#4a5d4a', rule: '#8fb08f', ruleSoft: '#a3c4a3' },
  lilac:   { paper: '#d0bce0', mute: '#5a4a6e', rule: '#ad97c4', ruleSoft: '#c3acd6' },
  cream:   { paper: '#f1ece1', mute: '#7a7163', rule: '#d0c7b3', ruleSoft: '#ddd4c0' }
};

const ACCENTS = {
  sienna: { light: '#8a3a1f', dark: '#d97757', wash: 'rgba(138,58,31,0.08)', washDark: 'rgba(217,119,87,0.1)' },
  ink:    { light: '#1a1612', dark: '#ebe3d3', wash: 'rgba(26,22,18,0.06)',  washDark: 'rgba(235,227,211,0.08)' },
  navy:   { light: '#1d3557', dark: '#7aa1d6', wash: 'rgba(29,53,87,0.08)',  washDark: 'rgba(122,161,214,0.1)' },
  moss:   { light: '#4a5d3a', dark: '#9bb27c', wash: 'rgba(74,93,58,0.08)',  washDark: 'rgba(155,178,124,0.1)' }
};

const state = { ...TWEAK_DEFAULTS };

function applyTweaks() {
  document.documentElement.setAttribute('data-theme', state.theme);
  const isDark = state.theme === 'dark';

  // Palette only affects light theme; dark stays its own thing.
  if (!isDark) {
    const p = PALETTES[state.palette] || PALETTES.mustard;
    document.documentElement.style.setProperty('--paper',     p.paper);
    document.documentElement.style.setProperty('--ink-mute',  p.mute);
    document.documentElement.style.setProperty('--rule',      p.rule);
    document.documentElement.style.setProperty('--rule-soft', p.ruleSoft);
  } else {
    document.documentElement.style.removeProperty('--paper');
    document.documentElement.style.removeProperty('--ink-mute');
    document.documentElement.style.removeProperty('--rule');
    document.documentElement.style.removeProperty('--rule-soft');
  }

  const a = ACCENTS[state.accent] || ACCENTS.sienna;
  document.documentElement.style.setProperty('--accent', isDark ? a.dark : a.light);
  document.documentElement.style.setProperty('--accent-wash', isDark ? a.washDark : a.wash);

  document.querySelectorAll('.tweaks-options').forEach(group => {
    const key = group.getAttribute('data-tweak');
    group.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-value') === state[key]);
    });
  });
}

function setTweak(key, value) {
  state[key] = value;
  applyTweaks();
  try {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  } catch (e) {}
}

document.querySelectorAll('.tweaks-options').forEach(group => {
  const key = group.getAttribute('data-tweak');
  group.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => setTweak(key, b.getAttribute('data-value')));
  });
});

applyTweaks();

const panel = document.getElementById('tweaks');
window.addEventListener('message', (e) => {
  if (!e.data || typeof e.data !== 'object') return;
  if (e.data.type === '__activate_edit_mode')   panel.classList.add('open');
  if (e.data.type === '__deactivate_edit_mode') panel.classList.remove('open');
});
document.getElementById('tweaks-close').addEventListener('click', () => {
  panel.classList.remove('open');
  try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}
});
try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
</script>

</body>
</html>
